<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onur's Dashboard | Professional SPA</title>
    <link rel="stylesheet" href="tabledemo2style.css">
</head>
<body>

    <button id="mobile-trigger" onclick="toggleMobileMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" width="30">
            <path d="M15 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8m4-9-4-4m4 4-4 4m4-4H9"/>
        </svg>
    </button>

    <nav id="side-nav">
        <div class="nav-group">
            <button class="nav-item" onclick="navigate('ideas')"><svg viewBox="0 0 24 24"><path d="M9 21h6m-3-3v3m-6-11a6 6 0 1 1 12 0c0 1.66-1.34 3-3 3s-3 1.34-3 3V15"/></svg></button>
            <button class="nav-item" onclick="navigate('fire')"><svg viewBox="0 0 24 24" style="stroke:#ff4500"><path d="M12 2c0 0-5 3.5-5 8.5s4 7.5 5 11.5c1-4 5-6.5 5-11.5S12 2 12 2z"/></svg></button>
            <button class="nav-item" onclick="navigate('add')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></button>
            <button class="nav-item" onclick="navigate('search')"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
            <button class="nav-item" onclick="navigate('home')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></button>
            <button class="nav-item" onclick="navigate('account')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
        </div>
        <div class="exit-group">
            <button class="nav-item"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
        </div>
    </nav>

    <main id="app-container"></main>
    <div id="subpage-container"></div>

    <script src="components.js"></script>
    <script src="templates.js"></script>
    <script src="app.js"></script>
</body>
</html>
